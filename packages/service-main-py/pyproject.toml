[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/service_main"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "B"]
ignore = []

[tool.ruff.format]
quote-style = "double"

[project]
name = "service-main"
description = ""
version = "0.0.1"
license = "MIT"
authors = [{ name = "YG Min", email = "ygmindev@gmail.com" }]
requires-python = "==3.13.12"
dependencies = [
    "lib-ai",
    "lib-config",
    "lib-model",
    "lib-shared"
]

[tool.uv.sources]
lib-ai = { workspace = true }
lib-config = { workspace = true }
lib-model = { workspace = true }
lib-shared = { workspace = true }

[tool.mypy]
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_defs = true
ignore_missing_imports = true
warn_unused_configs = true
