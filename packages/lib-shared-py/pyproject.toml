[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lib_shared"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "B"]
ignore = []

[tool.ruff.format]
quote-style = "double"

[project]
name = "lib-shared"
description = ""
version = "0.0.1"
license = "MIT"
authors = [{ name = "YG Min", email = "ygmindev@gmail.com" }]
requires-python = "==3.12.12"
dependencies = [
    "fastapi>=0.135.1",
    "pydantic>=2.12.5",
    "pydash>=8.0.6",
    "uvicorn>=0.41.0"
]

[dependency-groups]
dev = [
    "ruff>=0.15.4",
]
