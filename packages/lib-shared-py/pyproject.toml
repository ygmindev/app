[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lib_shared"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "B"]
ignore = []

[tool.ruff.format]
quote-style = "double"

[project]
name = "lib-shared"
description = ""
version = "0.0.1"
license = "MIT"
authors = [{ name = "YG Min", email = "ygmindev@gmail.com" }]
requires-python = "==3.13.12"
dependencies = []

[tool.mypy]
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_defs = true
ignore_missing_imports = true
warn_unused_configs = true
