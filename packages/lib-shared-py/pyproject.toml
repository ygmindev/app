[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lib_shared"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "B"]
ignore = []

[tool.ruff.format]
quote-style = "double"

[project]
name = "lib-shared"
description = ""
version = "0.0.1"
license = "MIT"
authors = [{ name = "YG Min", email = "ygmindev@gmail.com" }]
requires-python = "==3.13.12"
dependencies = [
    "beanie>=2.1.0",
    "pydantic>=2.13.3",
    "pydash>=8.0.6",
    "questionary>=2.1.1",
    "strawberry-graphql>=0.315.2",
    "uvicorn>=0.46.0",
]

[dependency-groups]
dev = [
    "pylint>=4.0.5",
    "ruff>=0.15.12",
]

[tool.mypy]
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_defs = true
ignore_missing_imports = true
warn_unused_configs = true
