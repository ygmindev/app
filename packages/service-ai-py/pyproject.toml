[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/service_ai"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "B"]
ignore = []

[tool.ruff.format]
quote-style = "double"

[project]
name = "service-ai"
description = ""
version = "0.0.1"
license = "MIT"
authors = [{ name = "YG Min", email = "ygmindev@gmail.com" }]
requires-python = "==3.13.12"
dependencies = [
    "lib-shared",
    "strawberry-graphql[fastapi]>=0.314.3",
    "uvicorn>=0.45.0",
]

[tool.uv.sources]
lib-shared = { path = "../lib-shared-py", editable = true }
