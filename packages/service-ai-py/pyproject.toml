[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/service_ai"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "B"]
ignore = []

[tool.ruff.format]
quote-style = "double"

[project]
name = "service-ai"
description = ""
version = "0.0.1"
license = "MIT"
authors = [{ name = "YG Min", email = "ygmindev@gmail.com" }]
requires-python = "==3.13.12"
dependencies = [
    "lib-ai",
    "lib-model",
    "lib-shared"
]

[tool.uv.sources]
lib-ai = { workspace = true }
lib-model = { workspace = true }
lib-shared = { workspace = true }
