[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lib_ai"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "B"]
ignore = []

[tool.ruff.format]
quote-style = "double"

[project]
name = "lib-ai"
description = ""
version = "0.0.1"
license = "MIT"
authors = [{ name = "YG Min", email = "ygmindev@gmail.com" }]
requires-python = "==3.13.12"
dependencies = [
    "langchain>=1.2.13",
    "langchain-core>=1.2.20",
    "langchain-ollama>=1.0.1",
    "langchain-openai>=1.1.11",
    "langgraph>=1.1.3",
    "lib-shared",
    "mcp>=1.26.0",
    "scikit-learn>=1.8.0",
    "torch>=2.10.0",
]

[tool.uv.sources]
lib-shared = { workspace = true }
