[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/service_server"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "B"]
ignore = []

[tool.ruff.format]
quote-style = "double"

[project]
name = "service-server"
description = ""
version = "0.0.1"
license = "MIT"
authors = [{ name = "YG Min", email = "ygmindev@gmail.com" }]
requires-python = "==3.12.12"
dependencies = [
    "lib-ai",
    "lib-config",
    "lib-shared",
    "setuptools>=82.0.0",
]

[tool.uv.sources]
lib-ai = { path = "../lib-ai-py", editable = true }
lib-config = { path = "../lib-config-py", editable = true }
lib-shared = { path = "../lib-shared-py", editable = true }
